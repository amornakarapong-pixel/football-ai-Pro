<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Football AI PRO | History

</title>

<link
rel="stylesheet"
href="history.css">

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>



<body>

<div class="bgGlow bg1"></div>
<div class="bgGlow bg2"></div>
<div class="bgGlow bg3"></div>

<div class="app">

<!-- ========================= -->
<!-- SIDEBAR -->
<!-- ========================= -->

<aside class="sidebar">

<div class="brand">

<div class="brandLogo">

⚽

</div>

<div>

<h2>

Football AI

</h2>

<p>

PRO

</p>

</div>

</div>

<nav>

<a href="/">

<i class="fa-solid fa-house"></i>

Dashboard

</a>

<a
class="active"
href="history.html">

<i class="fa-solid fa-clock-rotate-left"></i>

History

</a>

<a href="#">

<i class="fa-solid fa-chart-line"></i>

Statistics

</a>

<a href="#">

<i class="fa-solid fa-brain"></i>

AI Analysis

</a>

</nav>

</aside>

<!-- ========================= -->
<!-- MAIN -->
<!-- ========================= -->

<main class="content">

<header class="topBar">

<div>

<h1>

AI Analysis History

</h1>

<p>

Football AI PRO Dashboard

</p>

</div>

<div class="topButtons">

<a
class="homeBtn"
href="/">

<i class="fa-solid fa-house"></i>

Home

</a>

<button id="clearBtn">

<i class="fa-solid fa-trash"></i>

Clear

</button>

</div>

</header>
<!-- ========================= -->
<!-- SUMMARY -->
<!-- ========================= -->

<section
class="summarySection">

<div
id="historyStats"
class="statsGrid">

</div>

</section>

<!-- ========================= -->
<!-- PERFORMANCE -->
<!-- ========================= -->

<section
class="chartSection">

<div class="chartHeader">

<div>

<h2>

📈 AI Performance

</h2>

<p>

Win Rate / Accuracy / Pending

</p>

</div>

</div>

<div class="chartBody">

<canvas
id="historyChart">

</canvas>

</div>

</section>

<!-- ========================= -->
<!-- SEARCH -->
<!-- ========================= -->

<section
class="toolbar">

<div class="searchBox">

<i class="fa-solid fa-magnifying-glass"></i>

<input

id="searchBox"

type="text"

placeholder="ค้นหาทีม..."

>

</div>

<select id="filterStatus">

<option value="all">

ทั้งหมด

</option>

<option value="pending">

Pending

</option>

<option value="win">

WIN

</option>

<option value="lose">

LOSE

</option>

</select>

</section>

<!-- ========================= -->
<!-- HISTORY -->
<!-- ========================= -->

<section
class="historySection">

<div
id="historyList"
class="historyGrid">

<div class="loading">

<i class="fa-solid fa-spinner fa-spin"></i>

กำลังโหลด...

</div>

</div>

</section>
<!-- ========================= -->
<!-- FOOTER -->
<!-- ========================= -->

<footer class="footer">

<div class="footerLeft">

⚽ Football AI PRO V4

</div>

<div class="footerRight">

AI Prediction System

</div>

</footer>

</main>

</div>


<script src="history.js"></script>

<script src="auth.js"></script>

<script>
checkLogin();
</script>

<!-- ========================= -->
<!-- AI MODAL -->
<!-- ========================= -->

<div id="aiModal" class="modal">

    <div class="modal-content">

        <span id="closeModal" class="close">
            ×
        </span>

        <div class="tabBar">

            <button onclick="showTab('tip')">
                🎯 ทีเด็ด
            </button>

            <button onclick="showTab('analysis')">
                📋 วิเคราะห์
            </button>

            <button onclick="showTab('odds')">
                📊 ตลาด
            </button>

        </div>

        <div id="modalBody">

        </div>

    </div>

</div>


</body>

</html>
